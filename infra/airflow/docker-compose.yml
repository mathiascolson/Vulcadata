x-airflow-common: &airflow-common
  build:
    context: ../..
    dockerfile: infra/airflow/Dockerfile
  env_file:
    - ../../.env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session

    # Airflow remote task logs on S3
    AIRFLOW__LOGGING__REMOTE_LOGGING: "true"
    AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: s3://vulcadata/airflow/logs
    AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: aws_default
    AIRFLOW_CONN_AWS_DEFAULT: aws://

    # Vulcadata runtime
    VULCADATA_PROJECT_ROOT: /opt/vulcadata
    VULCADATA_S3_BUCKET: vulcadata
    VULCADATA_SOURCE_NPZ: data/preprocessing/processed_full_stride5_with_quiet/volcano_multi.npz
    VULCADATA_SOURCE_ARRAY_KEY: X_test
    VULCADATA_LATEST_BATCH_NPZ: data/preprocessing/processed/latest_batch.npz
    VULCADATA_INFERENCE_CONFIG: configs/inference_config.yaml
    VULCADATA_MODEL_DECISION: configs/final_model_decision.json
    VULCADATA_INFERENCE_OUTPUT_JSON: reports/inference/latest_result.json
    VULCADATA_LATEST_PREDICTION_KEY: predictions/latest/prediction.json
    VULCADATA_EXPECTED_SEQ_LEN: "120"
    VULCADATA_EXPECTED_N_FEATURES: "992"
    VULCADATA_LATEST_BATCH_SIZE: "1"
    VULCADATA_INFERENCE_SCHEDULE: manual
  volumes:
    - ../../:/opt/vulcadata
    - ../../:/opt/airflow/project
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins

services:
  airflow-init:
    <<: *airflow-common
    container_name: vulcadata_airflow_init
    command: >
      bash -c "set -e;
        airflow db migrate;
        airflow users create --username airflow --firstname Airflow --lastname Admin --role Admin --email airflow@example.com --password airflow || true"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: vulcadata_airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    command: webserver
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-scheduler:
    <<: *airflow-common
    container_name: vulcadata_airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    restart: unless-stopped