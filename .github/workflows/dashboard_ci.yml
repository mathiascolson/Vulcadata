name: Dashboard CI

on:
  push:
    branches:
      - main
    paths:
      - "dashboard/streamlit/**"
      - ".github/workflows/dashboard_ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "dashboard/streamlit/**"
      - ".github/workflows/dashboard_ci.yml"
  workflow_dispatch:

jobs:
  dashboard-tests:
    name: Dashboard tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "dashboard/streamlit/requirements.txt"

      - name: Install dashboard dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r dashboard/streamlit/requirements.txt
          python -m pip install pytest

      - name: Compile dashboard Python files
        run: |
          python -m py_compile \
            dashboard/streamlit/app.py \
            dashboard/streamlit/dashboard_config.py \
            dashboard/streamlit/dashboard_data.py \
            dashboard/streamlit/dashboard_components.py

      - name: Run dashboard tests
        run: |
          python -m pytest dashboard/streamlit/tests -v
