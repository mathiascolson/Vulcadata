name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Pytest
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      VULCADATA_CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pytest pyyaml numpy pandas scikit-learn torch boto3 botocore mlflow evidently great-expectations python-dotenv
          fi

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Run tests
        run: |
          python -m pytest tests -v
